camera0:
  camera:
    type: camera
    mesh: kinect
    resolution: [512, 512]
    frequency: 30
    focal_length: 0.05
    focus_distance: 10
    mode: RGB
    pos: [0.0, 1.4, 1.1]
    ori: [-12.0, 0.0, 180.0]
    random:
      pos:
        min: [0.0, 0.0, 0.0]
        max: [0.0, 0.0, 0.0]
      ori:
        min: [0.0, 0.0, 0.0]
        max: [0.0, 0.0, 0.0]
    action_noise:
      pos:
        min: [0, 0, 0]
        max: [0, 0, 0]
      ori:
        min: [0, 0, 0]
        max: [0, 0, 0]
  planner:
    type: "gimbal"
    params:
      pos_stiffness: 40.0
      pos_damping: 8.0
      rot_stiffness: 10.0
      rot_damping: 4.0
      dt: 0.0167
      pos_target_threshold: 0.05
      rot_target_threshold_deg: 2.0
  annotator:
    enabled: True
    rgb_capture:
      type: rgb
      device: cpu
    camera_params:
      type: camera_params
      device: cpu

