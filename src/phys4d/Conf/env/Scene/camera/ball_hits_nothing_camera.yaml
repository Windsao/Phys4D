output_dir: "/home/user/phys4d/Phys4D/TestOutput/test_ball_hits_nothing_env"
disable_render_product: False
render_frame_num: 1
enable_tiled: False
colorize_depth: True

camera0:
  camera:
    type: camera
    mesh: kinect
    resolution: [512, 512]
    frequency: 30
    focal_length: 0.05
    focus_distance: 10
    mode: RGB
    pos: [-1.0, -1.2, 2.5]
    ori: [-28.0, 15.0, -12.0]

    random:
      pos:
        min: [0.0, 0.0, 0.0]
        max: [0.0, 0.0, 0.0]
      ori:
        min: [0.0, 0.0, 0.0]
        max: [0.0, 0.0, 0.0]

    action_noise:
      pos:
        min: [0, 0, 0]
        max: [0, 0, 0]
      ori:
        min: [0, 0, 0]
        max: [0, 0, 0]

  planner:
    type: "gimbal"
    params:
      pos_stiffness: 20.0
      pos_damping: 12.0
      rot_stiffness: 5.0
      rot_damping: 6.0
      dt: 0.0167
      pos_target_threshold: 0.05
      rot_target_threshold_deg: 2.0




  annotator:
    enabled: True
    rgb_capture:
      type: rgb
      device: cpu
    distance_to_camera_capture:
      type: distance_to_camera
      device: cpu
    motion_vectors_capture:
      type: motion_vectors
      device: cpu
    camera_params:
      type: camera_params
      device: cpu
