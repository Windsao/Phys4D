        max: [0.0, 0.0, 0.0]

    action_noise:
      pos:
        min: [0, 0, 0]
        max: [0, 0, 0]
      ori:
        min: [0, 0, 0]
        max: [0, 0, 0]
  annotator:
    enabled: True
    rgb_capture:
      type: rgb
      device: cpu
    motion_vectors_capture:
      type: motion_vectors
      device: cpu
    distance_to_camera_capture:
      type: distance_to_camera
      device: cpu
    camera_params:
      type: camera_params
      device: cpu
