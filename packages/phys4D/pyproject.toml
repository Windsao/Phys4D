[project]
name = "magicsim"
version = "0.2.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11, <3.12"
dependencies = [
    "gymnasium>=1.1.1",
    "hydra-core>=1.3.2",
    "loguru>=0.7.3",
    "open3d>=0.19.0",
    "opencv-python>=4.11.0.86",
    "pre-commit>=4.2.0",
    "ruff>=0.11.7",
    "torch==2.7.0",
    "torchaudio==2.7.0",
    "torchvision==0.22.0",
    "tomli>=2.2.1",
    "wheel>=0.45.1",
    "ninja>=1.11.1.4",
    "fastapi>=0.115.7",
    "unicorn>=2.1.3",
    "uvicorn>=0.29.0",
    "psutil>=5.9.8",
    "tyro>=0.9.17",
    "termcolor>=2.3.0",
]

[project.optional-dependencies]
isaac = [
    "isaacsim[all,extscache]==5.1.0",
    "isaacsim-links",
]

[project.scripts]
magicsim = "magicsim:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
required-environments = [
    "sys_platform == 'linux' and platform_machine == 'x86_64'"
]

[[tool.uv.index]]
url = "https://pypi.nvidia.com/"


[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true


[tool.uv.sources]
torch = [
  { index = "pytorch-cu128", marker = "sys_platform == 'linux'" },
]
torchvision = [
  { index = "pytorch-cu128", marker = "sys_platform == 'linux'" },
]

[tool.pip]
extra-index-url = "https://pypi.nvidia.com"



[tool.ruff]
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "Third_Party",
    "*.ipynb"
]
ignore = ["E402", "F841"]
