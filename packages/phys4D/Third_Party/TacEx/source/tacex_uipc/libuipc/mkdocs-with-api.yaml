site_name: Libuipc Documentation
site_description:
theme:
  name: material
  custom_dir: docs/overrides
  features:
    - navigation.indexes
    - content.tabs.link
    - content.code.copy
    - content.code.select
    - content.code.annotate
  palette:

    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode


    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - def_list
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight

use_directory_urls: true

plugins:
  - search
  - mkdocs-video
  - literate-nav:
      nav_file: nav.md
  - mkdoxy:
      projects:
        Libuipc:
          src-dirs: include/
          full-doc: True
          doxy-cfg:
            FILE_PATTERNS: "*.h*"
            RECURSIVE: True
            GENERATE_LATEX: False
            HAVE_DOT: True
            CLASS_DIAGRAMS: True
            CLASS_GRAPH: True

extra_css:
  - stylesheets/doxide.css
extra_javascript:
  - javascripts/mathjax.js
  - https:
  - https:



