













[metadata]


name = nvidia_curobo
author = NVIDIA Seattle Robotics Lab
description = GPU robot motion toolkit containing cuda accelerated kinematics, IK, MPC, Global motion planning, and optimization solvers.
url = https:
license = NVIDIA


long_description = file: README.md
long_description_content_type = text/markdown
license_files = LICENSE



classifiers =
  License :: Other/Proprietary License
  Operating System :: OS Independent
  Intended Audience :: Developers
  Natural Language :: English
  Programming Language :: Python :: 3
  Topic :: Scientific/Engineering :: Robotics


platforms = any

[options]
install_requires =
  pybind11
  networkx
  numpy
  numpy-quaternion
  pyyaml
  setuptools_scm>=6.2
  torch>=1.10
  trimesh
  yourdfpy>=0.0.53
  warp-lang>=0.9.0
  scipy>=1.7.0
  tqdm
  wheel
  importlib_resources
  scikit-image

packages = find_namespace:
package_dir =
  = src
include_package_data = True

[options.packages.find]
where = src
exclude =
    tests

[options.extras_require]
ci =
  anybadge
  black
  build
  flake8
  flake8-docstrings
  flake8-isort
  pytest>6.2.5
  pytest-cov
  twine
  sphinx
  sphinx_rtd_theme
  graphviz>=0.20.1
  furo
  sphinx-copybutton



smooth =
  trajectory_smoothing @ https:

usd =
  usd-core

dev =
  ipdb
  ipython
  black
  flake8
  flake8-docstrings
  flake8-isort
  pytest>6.2.5
  pytest-cov

isaacsim =
  tomli
  wheel
  ninja

doc =
  sphinx
  sphinx_rtd_theme
  graphviz>=0.20.1
  furo
  sphinx-copybutton

[options.entry_points]





[flake8]
max-line-length = 99
docstring-convention = google
exclude = .git,build,deprecated,dist,venv
ignore =
  W503
  E203
  E731
